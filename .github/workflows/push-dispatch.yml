name: Push Dispatch

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call push dispatch
        run: |
          curl -i "https://habit-rank.vercel.app/api/push/dispatch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
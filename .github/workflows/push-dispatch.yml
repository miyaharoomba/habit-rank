name: Push Dispatch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Call push dispatch
        run: |
          curl -sS -i --fail-with-body "https://habit-rank.vercel.app/api/corn/push-dispatch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

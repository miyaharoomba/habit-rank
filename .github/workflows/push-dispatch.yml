name: Push Dispatch

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call push dispatch
        run: |
          echo "Dispatch at $(date -u --iso-8601=seconds)"
          curl -sS -i --fail-with-body "https://habit-rank.vercel.app/api/corn/push-dispatch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
